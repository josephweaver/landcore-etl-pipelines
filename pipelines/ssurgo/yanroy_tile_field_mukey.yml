project_id: land_core
requires_pipelines:
  - pipelines/yanroy/filtered_rasters.yml
vars:
  dataset_id: stage.ssurgo_tile_field_mukey_v1
  name: ssurgo_yanroy_tile_field_mukey
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  filtered_csv: "{env.basedir}/data/yanroy/meta/filtered.csv"
  relative_path_field: relative_path
  minx_field: minx
  miny_field: miny
  maxx_field: maxx
  maxy_field: maxy
  tile_prefix_len: 6
  tiles_csv: "{expr.join(project.tiles_of_interest)}"
  ssurgo_path: "{env.basedir}/data/ssurgo/conus_mukey_grid/extract/MURASTER_30m.tif"
  ssurgo_layer: ""
  mukey_field: mukey
  states_csv: "{expr.join(project.states_of_interest)}"
  state_field: areasymbol
  ssurgo_polygon_path: "{env.basedir}/data/ssurgo/state/extract/ssurgo_mupolygon_yanroy_tiles.gpkg"
  ssurgo_polygon_glob: "{env.basedir}/data/ssurgo/state/extract/ssurgo_mupolygon_yanroy_tiles.gpkg,{env.basedir}/data/ssurgo/state/extract/**/*.gpkg,{env.basedir}/data/ssurgo/state/extract/**/*.gdb,{env.basedir}/data/ssurgo/state/extract/**/*mu*.shp,{env.basedir}/data/ssurgo/state/extract/**/*MU*.shp"
  ssurgo_polygon_layer: ssurgo_mapunit
  yanroy_polygon_glob: "{env.basedir}/data/yanroy/polygons/WELD_*_2010_field_segments.gpkg"
  field_id_field: tile_field_id
  tile_field: tile_id
  target_crs: EPSG:5070
  outdir: "{workdir}/tile_field_mukey"
  tile_mukey_csv: "{outdir}/tile_mukey.csv"
  tile_counts_csv: "{outdir}/tile_mukey_counts.csv"
  tile_mukey_summary_json: "{outdir}/tile_mukey_summary.json"
  tile_field_mukey_csv: "{env.basedir}/data/yanroy_ssurgo/meta/tile_field2mukey.csv"
  tile_field_mukey_long_csv: "{outdir}/tile_field_mukey_pairs.csv"
  tile_field_mukey_summary_json: "{outdir}/tile_field_mukey_summary.json"
dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
steps:
  - name: "{sys.step.NN}_build_tile_mukey_map"
    plugin: exec_script
    args:
      script: scripts/ssurgo/build_tile_mukey_map.py
      script_args: "--filtered-csv \"{filtered_csv}\" --relative-path-field \"{relative_path_field}\" --minx-field \"{minx_field}\" --miny-field \"{miny_field}\" --maxx-field \"{maxx_field}\" --maxy-field \"{maxy_field}\" --tile-prefix-len {tile_prefix_len} --tiles-csv \"{tiles_csv}\" --ssurgo-path \"{ssurgo_path}\" --ssurgo-layer \"{ssurgo_layer}\" --mukey-field \"{mukey_field}\" --states-csv \"{states_csv}\" --state-field \"{state_field}\" --output-tile-mukey-csv \"{tile_mukey_csv}\" --output-tile-counts-csv \"{tile_counts_csv}\" --summary-json \"{tile_mukey_summary_json}\" --verbose"
      verbose: true
    output_var: tile_mukey
  - name: "{sys.step.NN}_build_tile_field_mukey_map"
    plugin: exec_script
    args:
      script: scripts/ssurgo/build_tile_field_mukey_map.py
      script_args: "--tile-mukey-csv \"{tile_mukey_csv}\" --fields-glob \"{yanroy_polygon_glob}\" --ssurgo-path \"{ssurgo_polygon_path}\" --ssurgo-glob \"{ssurgo_polygon_glob}\" --ssurgo-layer \"{ssurgo_polygon_layer}\" --states-csv \"{states_csv}\" --state-field \"{state_field}\" --field-id-field \"{field_id_field}\" --tile-field \"{tile_field}\" --mukey-field \"{mukey_field}\" --target-crs \"{target_crs}\" --output-csv \"{tile_field_mukey_csv}\" --output-long-csv \"{tile_field_mukey_long_csv}\" --summary-json \"{tile_field_mukey_summary_json}\" --verbose"
      verbose: true
    output_var: tile_field_mukey
