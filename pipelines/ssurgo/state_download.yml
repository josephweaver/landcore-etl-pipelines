project_id: land_core
vars:
  dataset_id: raw.ssurgo_state_download_v1
  name: ssurgo_state_download
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  rawdir: "{env.basedir}/data/ssurgo/state/raw"
  extractdir: "{env.basedir}/data/ssurgo/state/extract"
dirs:
  workdir: "{workdir}"
  logdir: "{logdir}"
steps:
  - name: "{sys.step.NN}_download_gssurgo_ia"
    plugin: web_download_list
    args:
      out: "{rawdir}"
      out_file: "{rawdir}/gSSURGO_IA.zip"
      overwrite: false
      timeout_seconds: 900
      urls: "https://nrcs.app.box.com/index.php?rm=box_download_shared_file&vanity_name=soils&file_id=f_2053608515775"
    output_var: gssurgo_ia
  - name: "{sys.step.NN}_download_gssurgo_il"
    plugin: web_download_list
    args:
      out: "{rawdir}"
      out_file: "{rawdir}/gSSURGO_IL.zip"
