project_id: land_core
vars:
  dataset_id: raw.ssurgo_state_download_v1
  name: ssurgo_state_download
  states_csv: "{expr.join(states_of_interest, ',')}"
  ssurgo_urls_file: pipelines/ssurgo/state_urls.txt
  ssurgo_url_template: ""
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  ssurgo_dir: "{env.basedir}/data/ssurgo/state"
  archivedir: "{ssurgo_dir}/archive"
  extractdir: "{ssurgo_dir}/extract"
  selected_urls_file: "{workdir}/ssurgo_state_urls.selected.txt"
dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
steps:
  - name: "{sys.step.NN}_select_state_urls"
    plugin: exec_script
    args:
      script: scripts/ssurgo/select_state_urls.py
      script_args: "--states \"{states_csv}\" --urls-file \"{ssurgo_urls_file}\" --url-template \"{ssurgo_url_template}\" --output-file \"{selected_urls_file}\" --strict --verbose"
      verbose: true
    output_var: selected_urls
  - name: "{sys.step.NN}_download_state_archives"
    plugin: web_download_list
    args:
      urls_file: "{selected_urls_file}"
      out: "{archivedir}"
      overwrite: false
      timeout_seconds: 600
      fail_on_error: true
      verbose: true
    output_var: staged_archives
  - name: "{sys.step.NN}_extract_state_archives"
    plugin: archive_extract
    args:
      archive_glob: "{archivedir}/*.zip"
      out: "{extractdir}"
      overwrite: false
    output_var: extracted_states
