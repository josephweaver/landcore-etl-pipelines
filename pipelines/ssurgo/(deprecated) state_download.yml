project_id: land_core
vars:
  dataset_id: raw.ssurgo_state_download_v1
  name: ssurgo_state_download
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  states_csv: "IL,MN,WI,OH,SD,IA,IN,MI,MO"
  urls_file: pipelines/ssurgo/state_urls.txt
  selected_urls_file: "{workdir}/ssurgo_state_urls.selected.txt"
  rawdir: "{env.basedir}/data/ssurgo/state/raw"
  extractdir: "{env.basedir}/data/ssurgo/state/extract"
  download_summary_json: "{workdir}/ssurgo_state_download.summary.json"
dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
steps:
  - name: "{sys.step.NN}_select_state_urls"
    plugin: exec_script
    args:
      script: scripts/ssurgo/select_state_urls.py
      script_args: "--states \"{states_csv}\" --urls-file \"{urls_file}\" --output-file \"{selected_urls_file}\" --strict --verbose"
      verbose: true
    output_var: selected_urls
  - name: "{sys.step.NN}_download_state_archives"
    plugin: exec_script
    args:
      script: scripts/ssurgo/download_urls.py
      script_args: "--urls-file \"{selected_urls_file}\" --out-dir \"{rawdir}\" --timeout-seconds 600 --summary-json \"{download_summary_json}\" --verbose"
      verbose: true
    output_var: staged_raw
  - name: "{sys.step.NN}_extract_state_archives"
    plugin: archive_extract
    args:
      archive_glob: "{rawdir}/*.zip"
      out: "{extractdir}"
      overwrite: true
    output_var: extracted_raw
