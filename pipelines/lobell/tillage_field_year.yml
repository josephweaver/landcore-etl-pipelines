project_id: land_core

requires_pipelines:
  - pipelines/lobell/tillage_download.yml
  - pipelines/yanroy/polygons.yml

vars:
  dataset_id: stage.lobell_tillage_field_year_v1
  name: lobell_tillage_field_year
  lobell_raw_dir: "{env.basedir}/data/lobell/tillage/raw"
  yanroy_polygon_dir: "{env.basedir}/data/yanroy/polygons"
  tiles: "{project.tiles_of_interest}"
  years:
    - 2000
    - 2001
    - 2002
    - 2003
    - 2004
    - 2005
    - 2006
    - 2007
    - 2008
    - 2009
    - 2010
    # - 2011
    # - 2012
    # - 2013
    # - 2014
    # - 2015
    # - 2016
    # - 2017
    # - 2018
    # - 2019
    # - 2020
  tile_years: "{expr.product(tiles, years)}"
  per_year_raster_dir: "{workdir}/by_year_raster"
  per_tile_year_csv_dir: "{workdir}/by_tile_year_csv"
  combined_raw_csv: "{workdir}/lobell_tillage_field_year.raw.csv"
  output_csv: "{workdir}/lobell_tillage_field_year.csv"
  summary_json: "{workdir}/lobell_tillage_field_year.summary.json"

dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"

steps:
  - name: "{sys.step.NN}_combine_tillage_rasters_by_year"
    plugin: geo/geo_raster_combine
    args:
      input_glob: "{lobell_raw_dir}/**/*{item}*.tif"
      output_path: "{per_year_raster_dir}/tillage_{item}.tif"
      overwrite: true
      verbose: true
    foreach: years
    resources:
      mem: "24G"
    output_var: combined_tillage_year

  - name: "{sys.step.NN}_aggregate_tillage_fields_by_tile_year"
    plugin: geo/raster_aggregate_by_polygon
    args:
      raster_path: "{per_year_raster_dir}/tillage_{item.1}.tif"
      polygon_path: "{yanroy_polygon_dir}/WELD_{item.0}_2010_field_segments.gpkg"
      output_path: "{per_tile_year_csv_dir}/tillage_{item.0}_{item.1}.csv"
      polygon_id_field: field_id
      columns:
        - source: literal
          name: tile_coord
          value: "{item.0}"
          type: str
        - source: polygon.field_id
          name: field_id
          type: int
        - source: literal
          value: "{item.1}"
          name: year
          type: int
        - source: raster.value_count.0
          name: tillage_0_count
          type: int
        - source: raster.value_count.1
          name: tillage_1_count
          type: int
        - source: raster.value_count.na
          name: tillage_na_count
          type: int
        - source: raster.value_proportion.0
          name: tillage_0_prop
          type: double
          format: ".6f"
        - source: raster.value_proportion.1
          name: tillage_1_prop
          type: double
          format: ".6f"
        - source: raster.value_proportion.na
          name: tillage_na_prop
          type: double
          format: ".6f"
        - source: raster.observed_count
          name: pixel_count
          type: int
      include_empty_polygons: false
      verbose: true
    foreach: tile_years
    output_var: aggregated_tillage_year

  - name: "{sys.step.NN}_combine_tillage_field_year_csvs"
    plugin: combine_files
    args:
      input_glob: "{per_tile_year_csv_dir}/*.csv"
      output_file: "{combined_raw_csv}"
      format: csv
      verbose: true
    output_var: combined_tillage_field_year

  - name: "{sys.step.NN}_normalize_tillage_field_year"
    plugin: exec_script
    args:
      script: scripts/model/normalize_lobell_tillage_field_year.py
      script_args: "--input-csv \"{combined_raw_csv}\" --output-csv \"{output_csv}\" --summary-json \"{summary_json}\""
      verbose: true
    output_var: lobell_tillage_field_year
