project_id: land_core

requires_pipelines:
  - pipelines/lobell/corn_download.yml
  - pipelines/yanroy/polygons.yml

vars:
  dataset_id: stage.lobell_corn_yanroy_field_year_v1
  name: lobell_corn_field_year
  lobell_raw_dir: "{env.basedir}/data/lobell/corn/raw"
  yanroy_polygon_path: "{env.basedir}/data/yanroy/polygons/field_polygons.gpkg"
  yanroy_polygon_dir: "{env.basedir}/data/yanroy/polygons"
  tiles: "{project.tiles_of_interest}"
  years:
    - 2005
    - 2006
    - 2007
    - 2008
    - 2009
    - 2010
    - 2011
    - 2012
    - 2013
    - 2014
    - 2015
    - 2016
    - 2017
    - 2018
    - 2019
    - 2020
  tile_years: "{expr.product(tiles, years)}"
  per_year_raster_dir: "{workdir}/by_year_raster"
  per_tile_year_csv_dir: "{workdir}/by_tile_year_csv"
  combined_raw_csv: "{workdir}/lobell_corn_yanroy_field_year.raw.csv"
  output_csv: "{workdir}/lobell_corn_yanroy_field_year.csv"
  summary_json: "{workdir}/lobell_corn_yanroy_field_year.summary.json"

dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"

steps:
  - name: "{sys.step.NN}_combine_corn_rasters_by_year"
    plugin: geo/geo_raster_combine
    args:
      input_glob: "{lobell_raw_dir}/**/*{item}*.tif"
      output_path: "{per_year_raster_dir}/corn_yield_{item}.tif"
      overwrite: true
      verbose: true
    foreach: years
    resources:
      mem: "24G"
    output_var: combined_corn_year

  - name: "{sys.step.NN}_aggregate_corn_fields_by_tile_year"
    plugin: geo/geo_county_raster_aggregate
    args:
      raster_path: "{per_year_raster_dir}/corn_yield_{item.1}.tif"
      county_path: "{yanroy_polygon_dir}/WELD_{item.0}_2010_field_segments.gpkg"
      output_path: "{per_tile_year_csv_dir}/corn_yield_{item.0}_{item.1}.csv"
      county_id_field: "field_id"
      county_name_field: "source_name"
      aggregations: "mean,count"
      value_prefix: "unscaled_yield"
      include_empty_polygons: false
      day: "{item.1}"
      verbose: true
    foreach: tile_years
    output_var: aggregated_corn_year

  - name: "{sys.step.NN}_combine_corn_field_year_csvs"
    plugin: combine_files
    args:
      input_glob: "{per_tile_year_csv_dir}/*.csv"
      output_file: "{combined_raw_csv}"
      format: csv
      verbose: true
    output_var: combined_corn_field_year

  - name: "{sys.step.NN}_normalize_corn_field_year"
    plugin: exec_script
    args:
      script: scripts/model/normalize_lobell_corn_field_year.py
      script_args: "--input-csv \"{combined_raw_csv}\" --output-csv \"{output_csv}\" --summary-json \"{summary_json}\""
      verbose: true
    output_var: lobell_corn_field_year
