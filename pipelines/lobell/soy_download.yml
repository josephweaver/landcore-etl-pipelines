project_id: land_core

vars:
  dataset_id: raw.lobell_soy_yield_rasters_v1
  name: lobell_soy_download
  gdrive_remote: gdrive
  gdrive_src: Data/Yield/Soy
  gdrive_glob: "*.tif"
  lobell_dir: "{env.basedir}/data/lobell/soy"
  rawdir: "{lobell_dir}/raw"

dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"

steps:
  - name: "{sys.step.NN}_download_lobell_soy_rasters"
    plugin: gdrive_download
    args:
      remote: "{gdrive_remote}"
      src: "{gdrive_src}"
      glob: "{gdrive_glob}"
      out: "{rawdir}"
      recursive: true
      no_clobber: true
      verbose: true
    output_var: staged_raw
