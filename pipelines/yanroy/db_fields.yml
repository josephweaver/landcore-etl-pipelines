project_id: land_core
shared_with_projects:
  - crop_insurance

requires_pipelines:
  - polygons.yml

vars:
  dataset_id: stage.yanroy_db_fields_v1
  field_dataset_id: serve.yanroy_fields
  field_boundary_dataset_id: serve.yanroy_field_boundaries
  name: yanroy_db_fields
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  yanroy_dir: "{env.basedir}/data/yanroy"
  db_dir: "{yanroy_dir}/db"
  polygon_combined_path: "{yanroy_dir}/polygons/field_polygons.gpkg"
  field_csv: "{db_dir}/field.csv"
  field_parquet: "{db_dir}/field.parquet"
  field_boundary_csv: "{db_dir}/field_boundary.csv"
  field_boundary_parquet: "{db_dir}/field_boundary.parquet"
  field_boundary_gpkg: "{db_dir}/field_boundary.gpkg"
  summary_json: "{db_dir}/field_boundary.summary.json"
  duckdb_repo_path: "../landcore-duckdb"
  duckdb_workspace: "{duckdb_repo_path}/workspace.yml"
  duckdb_validation_db: "{workdir}/yanroy_catalog_validation.duckdb"
  duckdb_fields_yaml: "{duckdb_repo_path}/tables/yanroy/fields.yml"
  duckdb_fields_sql: "{duckdb_repo_path}/views/yanroy/fields.sql"
  duckdb_boundaries_yaml: "{duckdb_repo_path}/tables/yanroy/field_boundaries.yml"
  duckdb_boundaries_sql: "{duckdb_repo_path}/views/yanroy/field_boundaries.sql"
  duckdb_fields_summary: "{workdir}/duckdb_fields.summary.json"
  duckdb_boundaries_summary: "{workdir}/duckdb_boundaries.summary.json"
  source: yanroy
  resolution: 30m
  valid_start: ""
  valid_end: ""

steps:
  - name: "{sys.step.NN}_build_db_field_tables"
    plugin: exec_script
    args:
      script: "scripts/yanroy/build_db_fields.py"
      script_args: "--input-vector \"{polygon_combined_path}\" --field-csv \"{field_csv}\" --field-parquet \"{field_parquet}\" --field-boundary-csv \"{field_boundary_csv}\" --field-boundary-parquet \"{field_boundary_parquet}\" --field-boundary-gpkg \"{field_boundary_gpkg}\" --summary-json \"{summary_json}\" --source \"{source}\" --resolution \"{resolution}\" --valid-start \"{valid_start}\" --valid-end \"{valid_end}\" --field-id-field field_id --tile-field tile_id --source-name-field source_name --verbose"
      verbose: true
    output_var: db_fields

  - name: "{sys.step.NN}_publish_field_parquet_gcs"
    plugin: dataset_store
    args:
      dataset_id: "{field_dataset_id}"
      path: "{field_parquet}"
      stage: "published"
      location_alias: "LC_GCS"
      locations_config: "config/data_locations.yml"
      workspace_auto_register: false
    output_var: field_store

  - name: "{sys.step.NN}_publish_field_boundary_parquet_gcs"
    plugin: dataset_store
    args:
      dataset_id: "{field_boundary_dataset_id}"
      path: "{field_boundary_parquet}"
      stage: "published"
      location_alias: "LC_GCS"
      locations_config: "config/data_locations.yml"
      workspace_auto_register: false
    output_var: field_boundary_store

  - name: "{sys.step.NN}_checkout_duckdb_repo"
    plugin: source_control_checkout
    args:
      repo_alias: "LC_DUCKDB"
      config_path: "config/source_control.yml"
      branch: "main"
      create_branch: false
      set_remote_url: false
    output_var: duckdb_checkout

  - name: "{sys.step.NN}_write_duckdb_fields_bundle"
    plugin: exec_script
    args:
      script: "scripts/duckdb/write_parquet_view_bundle.py"
      script_args: "--table-name yanroy_fields --dataset-id \"{field_dataset_id}\" --source-uri \"{field_store.target_uri}\" --yaml-path \"{duckdb_fields_yaml}\" --sql-path \"{duckdb_fields_sql}\" --summary-json \"{duckdb_fields_summary}\""
      verbose: true
    output_var: duckdb_fields_bundle

  - name: "{sys.step.NN}_write_duckdb_field_boundaries_bundle"
    plugin: exec_script
    args:
      script: "scripts/duckdb/write_parquet_view_bundle.py"
      script_args: "--table-name yanroy_field_boundaries --dataset-id \"{field_boundary_dataset_id}\" --source-uri \"{field_boundary_store.target_uri}\" --yaml-path \"{duckdb_boundaries_yaml}\" --sql-path \"{duckdb_boundaries_sql}\" --summary-json \"{duckdb_boundaries_summary}\""
      verbose: true
    output_var: duckdb_boundaries_bundle

  - name: "{sys.step.NN}_validate_duckdb_fields_sql"
    plugin: duckdb_sql
    args:
      db_path: "{duckdb_validation_db}"
      workspace_config_path: "{duckdb_workspace}"
      sql: "CREATE OR REPLACE VIEW yanroy_fields_local AS SELECT * FROM read_parquet('{field_parquet}', union_by_name=true); CREATE OR REPLACE VIEW yanroy_field_boundaries_local AS SELECT * FROM read_parquet('{field_boundary_parquet}', union_by_name=true); SELECT (SELECT COUNT(*) FROM yanroy_fields_local) AS field_rows, (SELECT COUNT(*) FROM yanroy_field_boundaries_local) AS boundary_rows;"
      fetch: true
      row_limit: 10
    output_var: duckdb_validation

  - name: "{sys.step.NN}_checkin_duckdb_repo"
    plugin: source_control_checkin
    args:
      repo_alias: "LC_DUCKDB"
      config_path: "config/source_control.yml"
      paths_json: "[\"{duckdb_fields_yaml}\",\"{duckdb_fields_sql}\",\"{duckdb_boundaries_yaml}\",\"{duckdb_boundaries_sql}\"]"
      commit_message: "Update YanRoy DuckDB tables"
      push: true
      branch: "main"
      base_branch: "main"
      direct_push: true
    output_var: duckdb_checkin
