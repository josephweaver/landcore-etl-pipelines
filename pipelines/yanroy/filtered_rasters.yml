project_id: land_core
requires_pipelines:
  - pipelines/yanroy/download.yml
  - pipelines/tiger/state.yml
vars:
  dataset_id: stage.yanroy_filtered_rasters_v1
  name: yanroy_filtered_rasters
  target_crs: EPSG:5070
  gdrive_remote: gdrive
  gdrive_meta_src: Data/ETL/Meta
  gdrive_meta_glob: states.of.interest.csv
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  yanroy_dir: "{env.basedir}/data/yanroy"
  rawdir: "{yanroy_dir}/raw"
  metadir: "{yanroy_dir}/meta"
  filtereddir: "{yanroy_dir}/filtered"
  tiger_state_path: "{env.basedir}/data/tiger/state/extract/tl_2025_us_state.shp"
  states_csv_path: "{metadir}/states.of.interest.csv"
  filtered_states_path: "{metadir}/states.of.interest.gpkg"
  filtered_states_5070_path: "{metadir}/states.of.interest.5070.gpkg"
  raster_filter_outdir: "{workdir}/raster_filter"
  filtered_raster_facts_csv: "{metadir}/filtered_raster_facts.csv"
  filtered_raster_facts_summary_json: "{workdir}/filtered_raster_facts.persist.summary.json"
dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
steps:
  - name: "{sys.step.NN}_filter_tiger_states"
    plugin: geo_vector_filter
    args:
      input_path: "{tiger_state_path}"
      output_path: "{filtered_states_path}"
      key: STUSPS
      op: in
      values: "{expr.join(project.states_of_interest)}"
      case_insensitive: true
      fail_on_empty: true
    output_var: filtered_states
  - name: "{sys.step.NN}_reproject_filtered_states"
    plugin: geo/geo_vector_reproject
    args:
      input_path: "{filtered_states_path}"
      output_path: "{filtered_states_5070_path}"
      target_crs: "{target_crs}"
      overwrite: true
    output_var: filtered_states_5070
  - name: "{sys.step.NN}_select_yanroy_rasters"
    plugin: geo_filter_rasters_by_polygon
    args:
      raster_dir: "{rawdir}"
      selector_path: "{filtered_states_5070_path}"
      output_dir: "{raster_filter_outdir}"
      raster_extensions: .hdr
      fail_on_missing_crs: false
      verbose: true
    output_var: selected_rasters
  - name: "{sys.step.NN}_persist_filtered_raster_facts"
    plugin: exec_script
    args:
      script: scripts/yanroy/persist_filtered_raster_facts.py
      script_args: "--source-csv \"{selected_rasters.selected_rasters_csv}\" --output-csv \"{filtered_raster_facts_csv}\" --summary-json \"{filtered_raster_facts_summary_json}\" --verbose"
      verbose: true
    output_var: persisted_filtered_raster_facts
  - name: "{sys.step.NN}_materialize_filtered_rasters"
    plugin: exec_script
    args:
      script: scripts/yanroy/copy_selected_rasters.py
      script_args: "--selected-csv \"{selected_rasters.selected_rasters_csv}\" --src-root \"{rawdir}\" --dst-root \"{filtereddir}\""
      verbose: true
    output_var: copied_rasters
