project_id: land_core
vars:
  dataset_id: raw.yanroy_download_v1
  name: yanroy_download
  gdrive_remote: gdrive
  gdrive_src: Data/Field_Boundaries
  gdrive_glob: ReleaseData.7z
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  yanroy_dir: "{env.basedir}/data/yanroy"
  archivedir: "{yanroy_dir}/archive"
  rawdir: "{yanroy_dir}/raw"
dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
steps:
  - name: "{sys.step.NN}_download_release_archive"
    plugin: gdrive_download
    args:
      remote: "{gdrive_remote}"
      src: "{gdrive_src}"
      glob: "{gdrive_glob}"
      out: "{archivedir}"
      recursive: false
      no_clobber: true
    output_var: staged_raw
  - name: "{sys.step.NN}_extract_release_archive"
    plugin: archive_extract
    args:
      archive_glob: "{archivedir}/*.7z"
      out: "{rawdir}"
      include_glob: "**/WELD_*_2010_field_segments
**/WELD_*_2010_field_segments.*
"
      overwrite: true
    output_var: extracted_raw
